<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Companion Pet</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="pet.css">
</head>
<body>
  <div id="pet-container">
    <!-- Speech Bubble -->
    <div id="speech-bubble" class="bubble hidden">
      <div class="bubble-text" id="bubble-content"></div>
      <div class="bubble-arrow"></div>
    </div>

    <!-- The Dog -->
    <div id="dog" class="state-sit">
      <svg id="dog-svg" viewBox="0 0 200 200">
        <!-- Ground Shadow -->
        <ellipse class="shadow" cx="100" cy="180" rx="55" ry="9" fill="rgba(0,0,0,0.12)" />

        <!-- ==================================================================
             1. FRONT VIEW (SIT, SCRATCH, IDLE states)
             ================================================================== -->
        <g class="view-front">
          <!-- Tail -->
          <g class="front-tail-group">
            <path class="tail" d="M 130,135 C 160,135 170,110 160,90 C 150,80 140,100 130,115 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
            <path class="tail-tip" d="M 159,94 C 155,87 149,88 146,95 C 149,98 155,99 159,94 Z" fill="#b2bec3" />
          </g>

          <!-- Back Legs Sitting -->
          <g class="front-legs-back">
            <path class="leg-bl" d="M 62,142 C 42,142 36,178 60,178 C 72,178 78,162 72,145 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
            <circle cx="50" cy="176" r="3.5" fill="#ffffff" stroke="#2f3542" stroke-width="2.5" />
            <circle cx="56" cy="177" r="3.5" fill="#ffffff" stroke="#2f3542" stroke-width="2.5" />
            <circle cx="62" cy="176" r="3.5" fill="#ffffff" stroke="#2f3542" stroke-width="2.5" />
            
            <path class="leg-br" d="M 138,142 C 158,142 164,178 140,178 C 128,178 122,162 128,145 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
            <circle cx="138" cy="176" r="3.5" fill="#ffffff" stroke="#2f3542" stroke-width="2.5" />
            <circle cx="144" cy="177" r="3.5" fill="#ffffff" stroke="#2f3542" stroke-width="2.5" />
            <circle cx="150" cy="176" r="3.5" fill="#ffffff" stroke="#2f3542" stroke-width="2.5" />
          </g>

          <!-- Body -->
          <path class="body" d="M 68,120 C 68,105 132,105 132,122 C 132,165 68,165 68,120 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
          
          <!-- Chest fluff -->
          <path class="chest" d="M 82,115 C 82,115 100,148 118,115 C 124,135 76,135 82,115 Z" fill="#ffffff" stroke="#2f3542" stroke-width="2" />

          <!-- Front Legs -->
          <g class="front-legs-front">
            <path class="leg-fl" d="M 82,130 C 76,130 76,178 86,178 C 94,178 94,130 82,130 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
            <circle cx="78" cy="176" r="3.5" fill="#ffffff" stroke="#2f3542" stroke-width="2.5" />
            <circle cx="83" cy="177" r="3.5" fill="#ffffff" stroke="#2f3542" stroke-width="2.5" />
            <circle cx="88" cy="176" r="3.5" fill="#ffffff" stroke="#2f3542" stroke-width="2.5" />

            <path class="leg-fr" d="M 118,130 C 124,130 124,178 114,178 C 106,178 106,130 118,130 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
            <circle cx="112" cy="176" r="3.5" fill="#ffffff" stroke="#2f3542" stroke-width="2.5" />
            <circle cx="117" cy="177" r="3.5" fill="#ffffff" stroke="#2f3542" stroke-width="2.5" />
            <circle cx="122" cy="176" r="3.5" fill="#ffffff" stroke="#2f3542" stroke-width="2.5" />
          </g>

          <!-- Neck & Collar (Exposes neck structure) -->
          <path class="neck" d="M 84,95 C 84,95 82,122 84,122 C 86,122 114,122 116,122 C 118,122 116,95 116,95 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
          <path class="collar" d="M 76,108 C 76,108 100,120 124,108 C 126,105 120,100 100,103 C 80,100 74,105 76,108 Z" fill="#ff4757" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
          <circle cx="100" cy="115" r="4.5" fill="#ffa502" stroke="#2f3542" stroke-width="2.5" />

          <!-- Head Group (Shifted up by 6px to reveal neck) -->
          <g class="head-group">
            <!-- Floppy Ears -->
            <path class="ear-l" d="M 68,54 C 42,59 30,102 52,112 C 68,118 76,76 68,54 Z" fill="#b2bec3" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
            <path class="ear-r" d="M 132,54 C 158,59 170,102 148,112 C 132,118 124,76 132,54 Z" fill="#b2bec3" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />

            <!-- Head Base -->
            <path class="head-base" d="M 62,60 C 62,26 138,26 138,60 C 138,94 62,94 62,60 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />

            <!-- Cheeks Blushing -->
            <circle cx="72" cy="72" r="4.5" fill="#ff7675" opacity="0.4" />
            <circle cx="128" cy="72" r="4.5" fill="#ff7675" opacity="0.4" />

            <!-- Eyes -->
            <g class="eyes">
              <g class="eye-l-group">
                <ellipse class="eye-white eye-l" cx="80" cy="62" rx="8" ry="10" fill="#ffffff" stroke="#2f3542" stroke-width="3" />
                <circle class="pupil pupil-l" cx="80" cy="62" r="4.5" fill="#2f3542" />
                <circle class="sparkle sparkle-l" cx="78" cy="59" r="1.5" fill="#ffffff" />
              </g>
              <g class="eye-r-group">
                <ellipse class="eye-white eye-r" cx="120" cy="62" rx="8" ry="10" fill="#ffffff" stroke="#2f3542" stroke-width="3" />
                <circle class="pupil pupil-r" cx="120" cy="62" r="4.5" fill="#2f3542" />
                <circle class="sparkle sparkle-r" cx="118" cy="59" r="1.5" fill="#ffffff" />
              </g>
              <path class="eye-sleep eye-sleep-l hidden" d="M 72,62 Q 80,68 88,62" stroke="#2f3542" stroke-width="3.5" stroke-linecap="round" fill="none" />
              <path class="eye-sleep eye-sleep-r hidden" d="M 112,62 Q 120,68 128,62" stroke="#2f3542" stroke-width="3.5" stroke-linecap="round" fill="none" />
            </g>

            <!-- Eyebrows -->
            <path class="eyebrow eyebrow-l" d="M 72,47 Q 80,43 86,48" stroke="#747d8c" stroke-width="2.5" stroke-linecap="round" fill="none" />
            <path class="eyebrow eyebrow-r" d="M 128,47 Q 120,43 114,48" stroke="#747d8c" stroke-width="2.5" stroke-linecap="round" fill="none" />

            <!-- Nose & Snout -->
            <path class="snout" d="M 85,76 C 85,70 115,70 115,76 C 115,89 85,89 85,76 Z" fill="#ffffff" />
            <path class="nose" d="M 94,70 C 94,66 106,66 106,70 C 106,75 94,75 94,70 Z" fill="#2f3542" />

            <!-- Mouth & Tongue -->
            <path class="mouth" d="M 100,74 L 100,79 Q 96,81 94,79 M 100,79 Q 104,81 106,79" stroke="#2f3542" stroke-width="2.5" stroke-linecap="round" fill="none" />
            <path class="tongue hidden" d="M 97,79 C 97,79 98,88 100,88 C 102,88 103,79 103,79 Z" fill="#ff7675" />
          </g>
        </g>

        <!-- ==================================================================
             2. SIDE VIEW (WALK, RUN states)
             ================================================================== -->
        <g class="view-side">
          <!-- Tail -->
          <g class="side-tail-group">
            <path class="side-tail" d="M 50,122 C 30,110 32,80 48,82 C 58,84 55,108 50,122 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
            <path class="side-tail-tip" d="M 46,82 C 40,84 41,92 48,90 Z" fill="#b2bec3" />
          </g>

          <!-- Back Right Leg (depth background) -->
          <path class="side-leg-br" d="M 72,135 C 72,135 62,175 72,175 C 80,175 82,135 72,135 Z" fill="#e2e8f0" stroke="#2f3542" stroke-width="4" stroke-linejoin="round" />
          <!-- Front Right Leg (depth background) -->
          <path class="side-leg-fr" d="M 112,135 C 112,135 104,175 114,175 C 122,175 124,135 112,135 Z" fill="#e2e8f0" stroke="#2f3542" stroke-width="4" stroke-linejoin="round" />

          <!-- Body -->
          <path class="side-body" d="M 54,120 C 54,105 130,110 130,130 C 130,158 54,152 54,120 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />

          <!-- Back Left Leg (foreground) -->
          <path class="side-leg-bl" d="M 64,135 C 64,135 54,178 64,178 C 74,178 76,135 64,135 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
          <!-- Front Left Leg (foreground) -->
          <path class="side-leg-fl" d="M 122,135 C 122,135 114,178 124,178 C 134,178 136,135 122,135 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />

          <!-- Side Head -->
          <g class="side-head-group">
            <path class="side-head-base" d="M 112,90 C 105,65 155,55 160,82 C 165,105 120,110 112,90 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
            
            <!-- Side Collar (on top of chin) -->
            <path class="side-collar" d="M 116,110 C 116,110 128,118 134,112 C 132,104 120,104 116,110 Z" fill="#ff4757" stroke="#2f3542" stroke-width="3.5" />
            <circle cx="128" cy="115" r="3" fill="#ffa502" stroke="#2f3542" stroke-width="1.8" />

            <path class="side-ear" d="M 116,70 C 102,74 96,108 110,112 C 122,114 126,86 116,70 Z" fill="#b2bec3" stroke="#2f3542" stroke-width="4" stroke-linejoin="round" />
            <ellipse class="side-eye" cx="140" cy="74" rx="4" ry="6" fill="#2f3542" />
            <circle cx="138" cy="72" r="1.2" fill="#ffffff" />
            <path class="side-nose" d="M 158,80 C 162,80 162,85 158,85 Z" fill="#2f3542" />
            <path class="side-mouth" d="M 148,88 Q 154,90 156,86" stroke="#2f3542" stroke-width="2" fill="none" />
          </g>
        </g>

        <!-- ==================================================================
             3. SLEEP VIEW (SLEEP state)
             ================================================================== -->
        <g class="view-sleep">
          <!-- Curled Body -->
          <path class="sleep-body" d="M 50,150 C 35,120 165,120 150,150 C 135,178 65,178 50,150 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
          
          <!-- Curled Tail -->
          <path class="sleep-tail" d="M 50,155 C 38,155 35,140 46,134" stroke="#2f3542" stroke-width="4" fill="none" />

          <!-- Draped Ear -->
          <path class="sleep-ear" d="M 94,136 C 80,140 76,168 88,170 C 100,172 104,142 94,136 Z" fill="#b2bec3" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />

          <!-- Head portion resting -->
          <path class="sleep-head" d="M 98,135 C 98,135 130,130 134,148 C 138,162 108,165 98,135 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4" stroke-linejoin="round" />
          
          <!-- Closed Eye -->
          <path class="sleep-eye" d="M 115,145 Q 120,150 125,145" stroke="#2f3542" stroke-width="2.5" stroke-linecap="round" fill="none" />
          <path class="sleep-nose" d="M 132,146 C 134,146 134,149 132,149 Z" fill="#2f3542" />
        </g>

        <!-- ==================================================================
             4. STRETCH VIEW (STRETCH state)
             ================================================================== -->
        <g class="view-stretch">
          <!-- Tail high -->
          <path class="stretch-tail" d="M 55,100 C 40,82 32,55 46,58 C 58,60 62,85 55,100 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
          <path class="stretch-tail-tip" d="M 44,58 C 38,60 39,68 46,66 Z" fill="#b2bec3" />

          <!-- Back legs elevated -->
          <path class="stretch-leg-b" d="M 72,118 Q 62,145 68,155" stroke="#2f3542" stroke-width="4.5" fill="none" />

          <!-- Angled Body -->
          <path class="stretch-body" d="M 64,115 C 64,115 110,128 140,155 C 120,172 80,140 64,115 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />

          <!-- Front legs stretched forward -->
          <path class="stretch-leg-fl" d="M 134,152 L 165,178 L 155,178 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4" stroke-linejoin="round" />

          <!-- Stretched Head looking up -->
          <g class="stretch-head-group">
            <path class="stretch-head" d="M 132,116 C 125,95 158,85 162,105 C 166,125 138,125 132,116 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
            <path class="stretch-ear" d="M 130,102 C 118,106 116,132 126,135 Z" fill="#b2bec3" stroke="#2f3542" stroke-width="4" />
            <path class="stretch-eye" d="M 148,100 Q 152,98 154,103" stroke="#2f3542" stroke-width="2.5" fill="none" />
          </g>
        </g>
      </svg>
    </div>
  </div>

  <script src="pet.js"></script>
</body>
</html>
