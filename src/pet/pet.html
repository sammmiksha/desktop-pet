<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Companion Pet</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="pet.css">
</head>
<body>
  <div id="pet-container">
    <!-- Speech Bubble -->
    <div id="speech-bubble" class="bubble hidden">
      <div class="bubble-text" id="bubble-content"></div>
      <div class="bubble-arrow"></div>
    </div>

    <!-- The Dog -->
    <div id="dog" class="state-sit">
      <svg id="dog-svg" viewBox="0 0 200 200">
        <!-- Ground Shadow -->
        <ellipse class="shadow" cx="100" cy="180" rx="55" ry="9" fill="rgba(0,0,0,0.12)" />

        <!-- ==================================================================
             1. FRONT VIEW (SIT, SCRATCH, IDLE states)
             ================================================================== -->
        <g class="view-front">
          <!-- Tail connected naturally to pelvis -->
          <g class="front-tail-group">
            <image href="../../assets/buddy/idle/tail.webp" x="0" y="0" width="200" height="200" />
            <path class="tail" d="M 130,135 C 160,135 170,110 160,90 C 150,80 140,100 130,115 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
            <path class="tail-tip" d="M 159,94 C 155,87 149,88 146,95 C 149,98 155,99 159,94 Z" fill="#b2bec3" />
          </g>

          <!-- Back Legs Sitting (Attached at hips) -->
          <g class="front-legs-back">
            <image href="../../assets/buddy/idle/legs-back.webp" x="0" y="0" width="200" height="200" />
            <!-- Back Left Leg -->
            <path class="leg-bl-upper" d="M 70,145 C 50,145 44,168 62,172" stroke="#2f3542" stroke-width="4.5" stroke-linecap="round" fill="none" />
            <circle cx="50" cy="173" r="3" fill="#ffffff" stroke="#2f3542" stroke-width="2.2" />
            <circle cx="55" cy="174" r="3.5" fill="#ffffff" stroke="#2f3542" stroke-width="2.2" />
            <circle cx="60" cy="173" r="3" fill="#ffffff" stroke="#2f3542" stroke-width="2.2" />
            
            <!-- Back Right Leg -->
            <path class="leg-br-upper" d="M 130,145 C 150,145 156,168 138,172" stroke="#2f3542" stroke-width="4.5" stroke-linecap="round" fill="none" />
            <circle cx="140" cy="173" r="3" fill="#ffffff" stroke="#2f3542" stroke-width="2.2" />
            <circle cx="145" cy="174" r="3.5" fill="#ffffff" stroke="#2f3542" stroke-width="2.2" />
            <circle cx="150" cy="173" r="3" fill="#ffffff" stroke="#2f3542" stroke-width="2.2" />
          </g>

          <!-- Torso with defined shoulders, chest, and waist -->
          <g class="body-wrapper">
            <image href="../../assets/buddy/idle/body.webp" x="0" y="0" width="200" height="200" />
            <path class="body" d="M 85,120 C 72,120 68,132 70,146 C 72,154 66,160 70,170 C 74,176 126,176 130,170 C 134,160 128,154 130,146 C 132,132 128,120 115,120 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
            <path class="chest" d="M 80,124 C 80,124 100,148 120,124" fill="none" stroke="#2f3542" stroke-width="3" stroke-linecap="round" />
          </g>

          <!-- Front Legs (Attached under defined shoulders) -->
          <g class="front-legs-front">
            <image href="../../assets/buddy/idle/legs-front.webp" x="0" y="0" width="200" height="200" />
            <!-- Front Left Leg -->
            <g class="leg-fl-group">
              <path class="leg-fl-upper" d="M 76,130 C 72,130 72,156 78,156 C 84,156 84,130 76,130 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
              <path class="leg-fl-lower" d="M 78,152 C 74,152 74,173 78,173 C 82,173 86,173 86,152 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
              <circle cx="78" cy="173" r="3" fill="#ffffff" stroke="#2f3542" stroke-width="2.2" />
              <circle cx="82" cy="174" r="3.5" fill="#ffffff" stroke="#2f3542" stroke-width="2.2" />
              <circle cx="86" cy="173" r="3" fill="#ffffff" stroke="#2f3542" stroke-width="2.2" />
            </g>

            <!-- Front Right Leg -->
            <g class="leg-fr-group">
              <path class="leg-fr-upper" d="M 124,130 C 128,130 128,156 122,156 C 116,156 116,130 124,130 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
              <path class="leg-fr-lower" d="M 122,152 C 126,152 126,173 122,173 C 118,173 114,173 114,152 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
              <circle cx="114" cy="173" r="3" fill="#ffffff" stroke="#2f3542" stroke-width="2.2" />
              <circle cx="118" cy="174" r="3.5" fill="#ffffff" stroke="#2f3542" stroke-width="2.2" />
              <circle cx="122" cy="173" r="3" fill="#ffffff" stroke="#2f3542" stroke-width="2.2" />
            </g>
          </g>

          <!-- Short Narrow Neck (Drawn behind head, on top of body) -->
          <g class="neck-wrapper">
            <image href="../../assets/buddy/idle/neck.webp" x="0" y="0" width="200" height="200" />
            <polygon points="86,88 114,88 112,124 88,124" fill="#ffffff" />
            <path d="M 86,88 C 86,88 87,106 88,124" stroke="#2f3542" stroke-width="4.5" stroke-linecap="round" fill="none" />
            <path d="M 114,88 C 114,88 113,106 112,124" stroke="#2f3542" stroke-width="4.5" stroke-linecap="round" fill="none" />
          </g>

          <!-- Head Bob Group (for CSS idle breathing bob) -->
          <g class="head-bob-group">
            <!-- Head Group (Shifted up by 6px to reveal neck, handles JS cursor head tilts) -->
            <g class="head-group">
              <!-- Floppy Ears -->
              <g class="ear-l-group">
                <image href="../../assets/buddy/idle/ear-l.webp" x="0" y="0" width="200" height="200" />
                <path class="ear-l" d="M 68,54 C 40,59 28,105 48,114 C 64,120 74,85 68,54 Z" fill="#b2bec3" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
              </g>
              <g class="ear-r-group">
                <image href="../../assets/buddy/idle/ear-r.webp" x="0" y="0" width="200" height="200" />
                <path class="ear-r" d="M 132,54 C 160,59 172,105 152,114 C 136,120 126,85 132,54 Z" fill="#b2bec3" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
              </g>

              <!-- Head Base (defined cheeks, round top) -->
              <g class="head-base-wrapper">
                <image href="../../assets/buddy/idle/head.webp" x="0" y="0" width="200" height="200" />
                <path class="head-base" d="M 62,60 C 60,32 140,32 138,60 C 138,76 130,88 100,88 C 70,88 62,76 62,60 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
              </g>

              <!-- Seamless Neck Cover-up (Erase chin outline over the neck width) -->
              <rect x="88" y="86" width="24" height="6" fill="#ffffff" />

              <!-- Collar -->
              <g class="collar-wrapper">
                <image href="../../assets/buddy/idle/collar.webp" x="0" y="0" width="200" height="200" />
                <path class="collar" d="M 76,104 C 76,104 100,116 124,104 C 126,101 120,96 100,99 C 80,96 74,101 76,104 Z" fill="#ff4757" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
              </g>
              <g class="tag-wrapper">
                <image href="../../assets/buddy/idle/tag.webp" x="0" y="0" width="200" height="200" />
                <circle cx="100" cy="111" r="4.5" fill="#ffa502" stroke="#2f3542" stroke-width="2.5" />
              </g>

              <!-- Cheeks Blushing -->
              <circle cx="72" cy="72" r="4.5" fill="#ff7675" opacity="0.4" />
              <circle cx="128" cy="72" r="4.5" fill="#ff7675" opacity="0.4" />

              <!-- Eyes -->
              <g class="eyes">
                <g class="eye-l-group">
                  <image href="../../assets/buddy/idle/eye-white-l.webp" x="0" y="0" width="200" height="200" />
                  <ellipse class="eye-white eye-l" cx="80" cy="58" rx="10" ry="12" fill="#ffffff" stroke="#2f3542" stroke-width="3" />
                  <image class="pupil pupil-l" href="../../assets/buddy/idle/pupil-l.webp" x="0" y="0" width="200" height="200" />
                  <circle class="pupil pupil-l" cx="80" cy="58" r="5" fill="#2f3542" />
                  <circle class="sparkle sparkle-l" cx="78" cy="55" r="1.5" fill="#ffffff" />
                </g>
                <g class="eye-r-group">
                  <image href="../../assets/buddy/idle/eye-white-r.webp" x="0" y="0" width="200" height="200" />
                  <ellipse class="eye-white eye-r" cx="120" cy="58" rx="10" ry="12" fill="#ffffff" stroke="#2f3542" stroke-width="3" />
                  <image class="pupil pupil-r" href="../../assets/buddy/idle/pupil-r.webp" x="0" y="0" width="200" height="200" />
                  <circle class="pupil pupil-r" cx="120" cy="58" r="5" fill="#2f3542" />
                  <circle class="sparkle sparkle-r" cx="118" cy="55" r="1.5" fill="#ffffff" />
                </g>
                <path class="eye-sleep eye-sleep-l hidden" d="M 70,58 Q 80,64 90,58" stroke="#2f3542" stroke-width="3.5" stroke-linecap="round" fill="none" />
                <path class="eye-sleep eye-sleep-r hidden" d="M 110,58 Q 120,64 130,58" stroke="#2f3542" stroke-width="3.5" stroke-linecap="round" fill="none" />
              </g>

              <!-- Eyebrows -->
              <path class="eyebrow eyebrow-l" d="M 72,43 Q 80,39 86,44" stroke="#747d8c" stroke-width="2.5" stroke-linecap="round" fill="none" />
              <path class="eyebrow eyebrow-r" d="M 128,43 Q 120,39 114,44" stroke="#747d8c" stroke-width="2.5" stroke-linecap="round" fill="none" />

              <!-- Nose & Snout / Medium Muzzle -->
              <g class="snout-wrapper">
                <image href="../../assets/buddy/idle/snout.webp" x="0" y="0" width="200" height="200" />
                <path class="snout" d="M 82,75 C 82,68 118,68 118,75 C 118,85 82,85 82,75 Z" fill="#ffffff" stroke="#2f3542" stroke-width="3" stroke-linejoin="round" />
              </g>
              <g class="nose-wrapper">
                <image href="../../assets/buddy/idle/nose.webp" x="0" y="0" width="200" height="200" />
                <path class="nose" d="M 94,72 C 94,68 106,68 106,72 Z" fill="#2f3542" />
              </g>

              <!-- Mouth & Tongue -->
              <g class="mouth-wrapper">
                <image href="../../assets/buddy/idle/mouth.webp" x="0" y="0" width="200" height="200" />
                <path class="mouth" d="M 95,78 Q 100,82 105,78" stroke="#2f3542" stroke-width="2.5" stroke-linecap="round" fill="none" />
                <path class="tongue hidden" d="M 97,79 C 97,79 98,88 100,88 C 102,88 103,79 103,79 Z" fill="#ff7675" />
              </g>
            </g>
          </g>
        </g>
        </g>

        <!-- ==================================================================
             2. SIDE VIEW (WALK, RUN states)
             ================================================================== -->
        <g class="view-side">
          <!-- Side Body Spritesheet (Legs + Torso + Tail animate here) -->
          <g class="side-body-spritesheet">
            <!-- Frame 1 (Contact - L forward, R backward) -->
            <g class="frame frame-1">
              <image href="../../assets/buddy/walk/walk-1.webp" x="0" y="0" width="200" height="200" />
              <path class="side-tail" d="M 50,122 C 30,110 32,80 48,82 C 58,84 55,108 50,122 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
              <path class="side-tail-tip" d="M 46,82 C 40,84 41,92 48,90 Z" fill="#b2bec3" />
              <!-- Back Right Leg -->
              <path d="M 82,132 C 78,138 78,154 84,173" fill="none" stroke="#2f3542" stroke-width="4.5" stroke-linecap="round" />
              <circle cx="84" cy="173" r="2.5" fill="#e2e8f0" stroke="#2f3542" stroke-width="2" />
              <!-- Front Right Leg -->
              <path d="M 112,130 C 108,138 104,154 100,173" fill="none" stroke="#2f3542" stroke-width="4.5" stroke-linecap="round" />
              <circle cx="100" cy="173" r="2.5" fill="#e2e8f0" stroke="#2f3542" stroke-width="2" />
              <!-- Body Torso -->
              <path class="side-body" d="M 60,122 C 48,122 46,146 58,148 L 126,144 C 138,144 140,118 128,118 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
              <!-- Back Left Leg -->
              <path d="M 74,130 C 66,138 60,154 56,173" fill="none" stroke="#2f3542" stroke-width="4.5" stroke-linecap="round" />
              <circle cx="56" cy="173" r="2.5" fill="#ffffff" stroke="#2f3542" stroke-width="2" />
              <!-- Front Left Leg -->
              <path d="M 120,130 C 124,138 128,154 132,173" fill="none" stroke="#2f3542" stroke-width="4.5" stroke-linecap="round" />
              <circle cx="132" cy="173" r="2.5" fill="#ffffff" stroke="#2f3542" stroke-width="2" />
            </g>

            <!-- Frame 2 (Passing) -->
            <g class="frame frame-2">
              <image href="../../assets/buddy/walk/walk-2.webp" x="0" y="0" width="200" height="200" />
              <path class="side-tail" d="M 50,120 C 30,108 32,78 48,80 C 58,82 55,106 50,120 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
              <path class="side-tail-tip" d="M 46,80 C 40,82 41,90 48,88 Z" fill="#b2bec3" />
              <!-- Back Right Leg -->
              <path d="M 82,130 L 82,171" fill="none" stroke="#2f3542" stroke-width="4.5" stroke-linecap="round" />
              <circle cx="82" cy="171" r="2.5" fill="#e2e8f0" stroke="#2f3542" stroke-width="2" />
              <!-- Front Right Leg -->
              <path d="M 112,128 L 112,169" fill="none" stroke="#2f3542" stroke-width="4.5" stroke-linecap="round" />
              <circle cx="112" cy="169" r="2.5" fill="#e2e8f0" stroke="#2f3542" stroke-width="2" />
              <!-- Body Torso (lifted slightly) -->
              <path class="side-body" d="M 60,120 C 48,120 46,144 58,146 L 126,142 C 138,142 140,116 128,116 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
              <!-- Back Left Leg -->
              <path d="M 74,128 L 74,169" fill="none" stroke="#2f3542" stroke-width="4.5" stroke-linecap="round" />
              <circle cx="74" cy="169" r="2.5" fill="#ffffff" stroke="#2f3542" stroke-width="2" />
              <!-- Front Left Leg -->
              <path d="M 120,128 L 120,169" fill="none" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
              <circle cx="120" cy="169" r="2.5" fill="#ffffff" stroke="#2f3542" stroke-width="2" />
            </g>

            <!-- Frame 3 (Contact opposite - R forward, L backward) -->
            <g class="frame frame-3">
              <image href="../../assets/buddy/walk/walk-3.webp" x="0" y="0" width="200" height="200" />
              <path class="side-tail" d="M 50,122 C 30,110 32,80 48,82 C 58,84 55,108 50,122 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
              <path class="side-tail-tip" d="M 46,82 C 40,84 41,92 48,90 Z" fill="#b2bec3" />
              <!-- Back Right Leg -->
              <path d="M 82,132 C 78,138 72,154 68,173" fill="none" stroke="#2f3542" stroke-width="4.5" stroke-linecap="round" />
              <circle cx="68" cy="173" r="2.5" fill="#e2e8f0" stroke="#2f3542" stroke-width="2" />
              <!-- Front Right Leg -->
              <path d="M 112,130 C 116,138 120,154 124,173" fill="none" stroke="#2f3542" stroke-width="4.5" stroke-linecap="round" />
              <circle cx="124" cy="173" r="2.5" fill="#e2e8f0" stroke="#2f3542" stroke-width="2" />
              <!-- Body Torso -->
              <path class="side-body" d="M 60,122 C 48,122 46,146 58,148 L 126,144 C 138,144 140,118 128,118 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
              <!-- Back Left Leg -->
              <path d="M 74,130 C 78,138 82,154 86,173" fill="none" stroke="#2f3542" stroke-width="4.5" stroke-linecap="round" />
              <circle cx="86" cy="173" r="2.5" fill="#ffffff" stroke="#2f3542" stroke-width="2" />
              <!-- Front Left Leg -->
              <path d="M 120,130 C 116,138 112,154 108,173" fill="none" stroke="#2f3542" stroke-width="4.5" stroke-linecap="round" />
              <circle cx="108" cy="173" r="2.5" fill="#ffffff" stroke="#2f3542" stroke-width="2" />
            </g>

            <!-- Frame 4 (High-point transition) -->
            <g class="frame frame-4">
              <image href="../../assets/buddy/walk/walk-4.webp" x="0" y="0" width="200" height="200" />
              <path class="side-tail" d="M 50,119 C 30,107 32,77 48,79 C 58,81 55,105 50,119 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
              <path class="side-tail-tip" d="M 46,79 C 40,81 41,89 48,87 Z" fill="#b2bec3" />
              <!-- Back Right Leg -->
              <path d="M 82,129 C 78,134 76,148 80,165" fill="none" stroke="#2f3542" stroke-width="4.5" stroke-linecap="round" />
              <circle cx="80" cy="165" r="2.5" fill="#e2e8f0" stroke="#2f3542" stroke-width="2" />
              <!-- Front Right Leg -->
              <path d="M 112,127 C 110,132 108,148 106,165" fill="none" stroke="#2f3542" stroke-width="4.5" stroke-linecap="round" />
              <circle cx="106" cy="165" r="2.5" fill="#e2e8f0" stroke="#2f3542" stroke-width="2" />
              <!-- Body Torso (lifted highest) -->
              <path class="side-body" d="M 60,119 C 48,119 46,143 58,145 L 126,141 C 138,141 140,115 128,115 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
              <!-- Back Left Leg -->
              <path d="M 74,127 C 72,132 70,148 68,165" fill="none" stroke="#2f3542" stroke-width="4.5" stroke-linecap="round" />
              <circle cx="68" cy="165" r="2.5" fill="#ffffff" stroke="#2f3542" stroke-width="2" />
              <!-- Front Left Leg -->
              <path d="M 120,127 C 122,132 124,148 126,165" fill="none" stroke="#2f3542" stroke-width="4.5" stroke-linecap="round" />
              <circle cx="126" cy="165" r="2.5" fill="#ffffff" stroke="#2f3542" stroke-width="2" />
            </g>
          </g>

          <!-- Interactive Side Head Group (Stays on top, bobs and tilts!) -->
          <g class="side-head-bob-group">
            <g class="side-head-group">
              <!-- Side Neck -->
              <g class="side-neck-wrapper">
                <image href="../../assets/buddy/walk/walk-neck.webp" x="0" y="0" width="200" height="200" />
                <polygon points="118,118 128,102 136,106 124,120" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
              </g>
              
              <g class="side-head-base-wrapper">
                <image href="../../assets/buddy/walk/walk-head.webp" x="0" y="0" width="200" height="200" />
                <path class="side-head-base" d="M 112,90 C 105,65 155,55 160,82 C 165,105 120,110 112,90 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
              </g>
              
              <!-- Side Collar -->
              <g class="side-collar-wrapper">
                <image href="../../assets/buddy/walk/walk-collar.webp" x="0" y="0" width="200" height="200" />
                <path class="side-collar" d="M 116,110 C 116,110 128,118 134,112 C 132,104 120,104 116,110 Z" fill="#ff4757" stroke="#2f3542" stroke-width="3.5" />
                <circle cx="128" cy="115" r="3" fill="#ffa502" stroke="#2f3542" stroke-width="1.8" />
              </g>

              <g class="side-ear-wrapper">
                <image href="../../assets/buddy/walk/walk-ear.webp" x="0" y="0" width="200" height="200" />
                <path class="side-ear" d="M 116,70 C 102,74 96,108 110,112 C 122,114 126,86 116,70 Z" fill="#b2bec3" stroke="#2f3542" stroke-width="4" stroke-linejoin="round" />
              </g>
              
              <!-- Separated Side Eye layers for Real-time Pupil Tracking! -->
              <g class="side-eye-group">
                <image href="../../assets/buddy/walk/walk-eye-white.webp" x="0" y="0" width="200" height="200" />
                <ellipse class="side-eye-white" cx="140" cy="74" rx="6" ry="8" fill="#ffffff" stroke="#2f3542" stroke-width="2.5" />
                <image class="side-pupil" href="../../assets/buddy/walk/walk-pupil.webp" x="0" y="0" width="200" height="200" />
                <circle class="side-pupil" cx="140" cy="74" r="3.2" fill="#2f3542" />
                <circle class="side-sparkle" cx="138.5" cy="72" r="1.0" fill="#ffffff" />
              </g>
              
              <path class="side-nose" d="M 158,80 C 162,80 162,85 158,85 Z" fill="#2f3542" />
              <path class="side-mouth" d="M 148,88 Q 154,90 156,86" stroke="#2f3542" stroke-width="2" fill="none" />
            </g>
          </g>
        </g>

        <!-- ==================================================================
             3. SLEEP VIEW (SLEEP state)
             ================================================================== -->
        <g class="view-sleep">
          <image href="../../assets/buddy/sleep/sleep.webp" x="0" y="0" width="200" height="200" />
          <!-- Curled Body -->
          <path class="sleep-body" d="M 50,150 C 35,115 165,115 150,150 C 135,178 65,178 50,150 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
          
          <!-- Curled Tail -->
          <path class="sleep-tail" d="M 50,155 C 38,155 35,140 46,134" stroke="#2f3542" stroke-width="4" fill="none" />

          <!-- Draped Ear -->
          <path class="sleep-ear" d="M 94,136 C 80,140 76,168 88,170 Z" fill="#b2bec3" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />

          <!-- Head portion resting -->
          <path class="sleep-head" d="M 98,135 C 98,135 130,130 134,148 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4" stroke-linejoin="round" />
          
          <!-- Closed Eye -->
          <path class="sleep-eye" d="M 115,145 Q 120,150 125,145" stroke="#2f3542" stroke-width="2.5" fill="none" />
          <path class="sleep-nose" d="M 132,146 C 134,146 134,149 132,149 Z" fill="#2f3542" />
        </g>

        <!-- ==================================================================
             4. STRETCH VIEW (STRETCH state)
             ================================================================== -->
        <g class="view-stretch">
          <image href="../../assets/buddy/stretch/stretch.webp" x="0" y="0" width="200" height="200" />
          <!-- Tail high -->
          <path class="stretch-tail" d="M 55,100 Q 40,82 46,58 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
          <path class="stretch-tail-tip" d="M 44,58 C 38,60 39,68 46,66 Z" fill="#b2bec3" />

          <!-- Back legs elevated (jointed stretch) -->
          <path class="stretch-leg-bl" d="M 66,128 L 56,155 L 68,155 Z" fill="#ffffff" stroke="#2f3542" stroke-width="4.5" stroke-linejoin="round" />
