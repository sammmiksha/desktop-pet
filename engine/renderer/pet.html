<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Companion Pet</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="pet.css">
</head>
<body>
  <div id="pet-container">
    <div id="speech-bubble" class="bubble hidden">
      <div class="bubble-text" id="bubble-content"></div>
      <div class="bubble-arrow"></div>
    </div>

    <div id="dog" class="state-idle facing-right" aria-label="Buddy desktop companion">
      <div class="dog-shadow" aria-hidden="true"></div>
      <div id="dog-stage" class="dog-stage"></div>
    </div>
  </div>

  <script src="pet.js"></script>
</body>
</html>
